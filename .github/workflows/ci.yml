name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install (editable + dev extras)
        run: pip install -e ".[dev]"
      - name: Run tests
        run: python -m pytest -q

  smoke:
    name: smoke run (--simulate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: pip install -e .
      - name: Headless simulate run
        run: python -m flippergotchi --simulate --plain --ticks 5 --time-scale 50
