name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install (editable + dev extras)
        run: pip install -e ".[dev]"
      - name: Run tests
        run: python -m pytest -q

  smoke:
    name: smoke run (--simulate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install
        run: pip install -e .
      - name: Headless simulate run
        run: python -m flippergotchi --simulate --plain --ticks 5 --time-scale 50

  aarch64:
    # Exercises the arm64/aarch64 story (the Flipper One is an RK3576 Arm-Linux
    # device) under emulation, since GitHub's hosted runners are x86_64. This
    # runs the stdlib-only core install + full test suite inside an arm64
    # Debian container via QEMU. It is slower than the native x86 jobs but must
    # stay green -- it guards against arch-specific import/packaging breakage.
    name: aarch64 (QEMU) core install + pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Set up QEMU (arm64 emulation)
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64
      - name: Install + test on aarch64
        run: |
          docker run --rm --platform linux/arm64 \
            -v "${{ github.workspace }}:/src" -w /src \
            arm64v8/python:3.12-slim bash -euxo pipefail -c '
              uname -m
              pip install --no-cache-dir -e ".[dev]"
              python -m flippergotchi --simulate --plain --ticks 5 --time-scale 50
              python -m pytest -q
            '

  ble-import:
    # BlueZ/bleak backend can not be functionally exercised on the hosted
    # runners (no Bluetooth adapter), but we can at least prove the `ble` extra
    # resolves and imports cleanly on Linux -- the platform the Flipper One
    # actually uses. Keeps the BlueZ dependency story from silently rotting.
    name: ble extra install + import
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install with the ble extra
        run: pip install -e ".[ble]"
      - name: Validate bleak import
        run: python -c "import bleak; from bleak import BleakScanner; from importlib.metadata import version; print('bleak', version('bleak'))"

  previews:
    # Regenerate the device-accurate render previews (docs/device/) through the
    # real pipeline: HTML -> headless WebKit at 256x144 -> 6-bit grayscale +
    # dithering. WebKit is the engine the Flipper One runs on DRM, so this guards
    # that every screen still renders and the shoot.py harness keeps working.
    #
    # It uploads the regenerated set as an artifact rather than hard-failing on a
    # diff against the committed PNGs: rendered images are not byte-deterministic
    # across hosts (font hinting, antialiasing, PNG encoder all vary), so a strict
    # `git diff` gate would be flaky. `make previews` DOES fail if the pipeline
    # produces nothing, so a genuinely broken renderer still breaks CI.
    name: device render previews (webkit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install app + preview harness (Playwright + WebKit host deps)
        run: |
          pip install -e .
          make previews-deps
      - name: Regenerate device previews
        run: make previews
      - name: Upload previews
        uses: actions/upload-artifact@v4
        with:
          name: device-previews
          path: docs/device/*.png
          if-no-files-found: error
